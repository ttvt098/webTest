<!DOCTYPE html>
<html>
<head>
<title>LibConnect Demo</title>
</head>
<body>
<h1>Hello, welcome to LibConnect Demo Site!</h1>
<h1>Whosville library book search</h1>
	<table>
	<form action="http://library.whosville/bsearch" method="get">
	<tr>
		<td>Author name: </td>
		<td><input type="text" name="authorname" size="30"/></td>
	</tr>
	
	<tr>
		<td>Publication year: </td>
		<td><input type="text" name="publicationyear" size="30"/> </td>
	</tr>
	
	<tr>
	<td valign ="top">Subject: </td>
	<td>
	<input type="checkbox" name= "subject" value="mth"> Mathematics <br/>
	<input type="checkbox" name= "subject" value="cs"> Computer Science <br/>
	<input type="checkbox" name= "subject" value="bio"> Biology <br/>
	<input type="checkbox" name= "subject" value="phy"> Physics <br/>
	<input type="checkbox" name= "subject" value="chem"> Chemistry <br/>
	
	<input type="submit" value="Search"/>
	<input type="reset" value="Clear"/>
	</td>
	</tr>
	
	<td>
	
	<td> </td>
	</tr>
	
	</form>
	</table>
</body>
</html>
